name: curvine-lancedb-rs

on:
  pull_request:
    paths:
      - "curvine-lancedb-rs/**"
      - ".github/workflows/curvine-lancedb-rs.yml"
  workflow_dispatch:

jobs:
  facade-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --manifest-path curvine-lancedb-rs/Cargo.toml --check

      - name: Run clippy
        run: cargo clippy --manifest-path curvine-lancedb-rs/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path curvine-lancedb-rs/Cargo.toml --test facade_compat -- --nocapture
