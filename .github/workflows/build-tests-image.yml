name: Build Tests Docker Image

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Whether to push image to registries'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  build-image:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: inputs.push_image == 'true' || inputs.push_image == true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.PAT_GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: inputs.push_image == 'true' || inputs.push_image == true
        uses: docker/login-action@v3
        with:
          username: curvine
          password: ${{ secrets.PAT_DOCKERIO_TOKEN }}

      - name: Build and push tests image (${{ matrix.arch }})
        uses: docker/build-push-action@v5
        with:
          context: .
          file: curvine-tests/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: ${{ inputs.push_image == 'true' || inputs.push_image == true }}
          tags: |
            ghcr.io/curvineio/curvine-tests:rocky9-${{ matrix.arch }}
            curvine/curvine-tests:rocky9-${{ matrix.arch }}
          cache-from: type=gha,scope=curvine-tests-rocky9-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=curvine-tests-rocky9-${{ matrix.arch }},ignore-error=true

      - name: Build summary for ${{ matrix.arch }}
        run: |
          echo "✅ Built tests image for rocky9 (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo "Image: ghcr.io/curvineio/curvine-tests:rocky9-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY

  create-manifest:
    needs: build-image
    runs-on: ubuntu-latest
    if: inputs.push_image == 'true' || inputs.push_image == true
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.PAT_GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: curvine
          password: ${{ secrets.PAT_DOCKERIO_TOKEN }}

      - name: Create and push multi-arch manifest for rocky9
        run: |
          # Create manifest for GHCR
          docker buildx imagetools create -t ghcr.io/curvineio/curvine-tests:rocky9 \
            ghcr.io/curvineio/curvine-tests:rocky9-amd64 \
            ghcr.io/curvineio/curvine-tests:rocky9-arm64

          # Create manifest for Docker Hub
          docker buildx imagetools create -t curvine/curvine-tests:rocky9 \
            curvine/curvine-tests:rocky9-amd64 \
            curvine/curvine-tests:rocky9-arm64

      - name: Manifest creation summary
        run: |
          echo "### Multi-arch Manifest Created for rocky9" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`rocky9\`" >> $GITHUB_STEP_SUMMARY
          echo "**Combined architectures:** amd64, arm64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Manifests created:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/curvineio/curvine-tests:rocky9\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`curvine/curvine-tests:rocky9\`" >> $GITHUB_STEP_SUMMARY

  summary:
    needs: [build-image, create-manifest]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Final build summary
        run: |
          echo "### Tests Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** rocky9" >> $GITHUB_STEP_SUMMARY
          echo "**Architectures:** amd64 (native), arm64 (native)" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** workflow_dispatch" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.push_image }}" == "true" ] || [ "${{ inputs.push_image }}" == "True" ]; then
            echo "**Multi-arch image:** \`ghcr.io/curvineio/curvine-tests:rocky9\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Pull:** \`docker pull ghcr.io/curvineio/curvine-tests:rocky9\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Note:** Images were built but not pushed (push_image=false)" >> $GITHUB_STEP_SUMMARY
          fi
