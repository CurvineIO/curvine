syntax = "proto2";
package proto;

option java_package = "io.curvine.proto.vector";
option java_multiple_files = true;

// Authoritative journal taxonomy for the vector control plane (materialized into VectorMetaStore).
enum VectorJournalEventKindProto {
  VECTOR_JOURNAL_NONE = 0;
  VECTOR_CREATE_BUCKET = 1;
  VECTOR_DELETE_BUCKET = 2;
  VECTOR_CREATE_INDEX = 3;
  VECTOR_DELETE_INDEX = 4;
  VECTOR_ASSIGN_ACTIVE_SEGMENT_OWNER = 5;
  VECTOR_ROTATE_OWNER_EPOCH = 6;
  VECTOR_COMMIT_BATCH = 7;
  VECTOR_PUBLISH_SEGMENT_GENERATION = 8;
  VECTOR_SEAL_SEGMENT = 9;
  VECTOR_SWAP_COMPACTED_SEGMENT = 10;
  VECTOR_DELETE_KEYS = 11;
  VECTOR_UPDATE_COMPACTION_JOB_STATE = 12;
  VECTOR_REGISTER_WORKER_SEGMENT_REPLICA = 13;
  VECTOR_MARK_SEGMENT_REPLICA_READY = 14;
}

// Fencing / visibility primitives carried alongside segment metadata.
message VectorSegmentFenceProto {
  optional uint64 owner_epoch = 1;
  optional uint64 segment_generation = 2;
  optional uint64 published_generation = 3;
}

message VectorBucketRefProto {
  optional string name = 1;
}

message VectorIndexRefProto {
  optional string bucket_name = 1;
  optional string index_name = 2;
}
